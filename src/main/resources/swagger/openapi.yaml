openapi: 3.0.3
info:
  title: Chat IA API
  version: 2.0.0
  description: >
    API do sistema de chat integrado com IA — RAG, ingestão de documentos,
    PostgreSQL + pgvector, Spring AI + OpenRouter e integração com n8n.

servers:
  - url: http://localhost:8080/api
    description: Local dev

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: "123456"

    LoginResponse:
      type: object
      required: [token, expiresIn]
      properties:
        token:
          type: string
          description: JWT token (HMAC-SHA256, expira em 24h)
          example: eyJhbGciOiJIUzI1NiIs...
        expiresIn:
          type: integer
          description: Tempo de expiração em segundos
          example: 86400

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 6
        email:
          type: string
          format: email

    RegisterResponse:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateSessionRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          description: Título da sessão

    ChatSessionResponse:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: string
          format: date-time

    SendMessageRequest:
      type: object
      required: [chatSessionId, content]
      properties:
        chatSessionId:
          type: string
          format: uuid
          description: ID da sessão de chat
        content:
          type: string
          maxLength: 10000
          description: Conteúdo da mensagem (máx 10.000 caracteres)

    MessageResponse:
      type: object
      required: [id, chatSessionId, role, content, timestamp]
      properties:
        id:
          type: string
          format: uuid
        chatSessionId:
          type: string
          format: uuid
        role:
          type: string
          enum: [USER, ASSISTANT]
        content:
          type: string
        timestamp:
          type: string
          format: date-time

    RagMessageResponse:
      type: object
      required: [id, chatSessionId, role, content, timestamp, sources]
      properties:
        id:
          type: string
          format: uuid
        chatSessionId:
          type: string
          format: uuid
        role:
          type: string
          enum: [ASSISTANT]
        content:
          type: string
          description: Resposta gerada pela IA com base no contexto dos documentos
        timestamp:
          type: string
          format: date-time
        sources:
          type: array
          description: Fontes utilizadas para gerar a resposta
          items:
            $ref: '#/components/schemas/SourceResponse'

    SourceResponse:
      type: object
      required: [documentId, documentName, chunkIndex, excerpt, score]
      properties:
        documentId:
          type: string
          format: uuid
          description: ID do documento de origem
        documentName:
          type: string
          description: Nome do arquivo original
        chunkIndex:
          type: integer
          description: Índice do chunk no documento
        excerpt:
          type: string
          description: Trecho do documento utilizado como contexto
          maxLength: 500
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Score de similaridade semântica (0.0 a 1.0)

    FileUploadResponse:
      type: object
      required: [fileId, fileName, fileSize, uploadedAt]
      properties:
        fileId:
          type: string
          format: uuid
        fileName:
          type: string
        fileSize:
          type: integer
          description: Tamanho do arquivo em bytes
          maximum: 5242880
        uploadedAt:
          type: string
          format: date-time

    DocumentResponse:
      type: object
      required: [id, fileName, fileSize, status, chunkCount, createdAt]
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
          description: Nome original do arquivo
        fileSize:
          type: integer
          description: Tamanho do arquivo em bytes
        status:
          type: string
          enum: [PENDING, PROCESSING, COMPLETED, FAILED]
          description: Status atual do pipeline de ingestão
        chunkCount:
          type: integer
          description: Número de chunks gerados (0 enquanto processando)
        createdAt:
          type: string
          format: date-time

    DocumentStatusResponse:
      allOf:
        - $ref: '#/components/schemas/DocumentResponse'
        - type: object
          properties:
            completedAt:
              type: string
              format: date-time
              nullable: true
              description: Momento em que o processamento foi concluído
            errorMessage:
              type: string
              nullable: true
              description: Mensagem de erro em caso de falha

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          example: UP
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [status, error, message, timestamp]
      properties:
        status:
          type: integer
          description: Código HTTP do erro
        error:
          type: string
          description: Nome do erro
          example: Bad Request
        message:
          type: string
          description: Descrição detalhada do erro
        timestamp:
          type: string
          format: date-time

paths:
  /auth/login:
    post:
      tags: [Autenticação]
      summary: Autenticar usuário e obter token JWT
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags: [Autenticação]
      summary: Registrar novo usuário
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuário cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Dados inválidos ou username já em uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/sessions:
    get:
      tags: [Chat]
      summary: Listar sessões de chat do usuário autenticado
      operationId: listSessions
      responses:
        '200':
          description: Lista de sessões retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSessionResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Chat]
      summary: Criar nova sessão de chat
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Sessão criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionResponse'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/sessions/{sessionId}/messages:
    get:
      tags: [Chat]
      summary: Obter histórico de mensagens de uma sessão
      operationId: getMessages
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID da sessão de chat
      responses:
        '200':
          description: Histórico de mensagens retornado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/messages:
    post:
      tags: [Chat]
      summary: >
        Enviar uma mensagem no chat com contexto RAG.
        A pergunta é processada com busca semântica nos documentos do usuário
        e a resposta inclui as fontes utilizadas.
      operationId: sendMessageWithRag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: >
            Mensagem processada com resposta RAG. A resposta inclui o campo
            `sources[]` com os trechos de documentos utilizados como contexto.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagMessageResponse'
        '400':
          description: Dados inválidos (conteúdo vazio ou excede 10.000 caracteres)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: >
            Provedor de embedding ou LLM indisponível. A mensagem USER foi
            salva mas a resposta ASSISTANT não pôde ser gerada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/files:
    post:
      tags: [Chat]
      summary: Fazer upload de arquivo anexo (TXT ou PDF, máx 5MB)
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Arquivo .txt ou .pdf (tamanho máximo 5.242.880 bytes)
      responses:
        '200':
          description: Arquivo enviado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Formato inválido (apenas TXT e PDF)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Arquivo excede o limite de 5MB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/files/{fileId}:
    get:
      tags: [Chat]
      summary: Baixar arquivo anexado
      operationId: downloadFile
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do arquivo
      responses:
        '200':
          description: Arquivo baixado com sucesso
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Arquivo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents:
    post:
      tags: [Documentos]
      summary: >
        Iniciar pipeline de ingestão de documento para RAG.
        O arquivo é parseado, dividido em chunks, embeddings são gerados e
        persistidos no PostgreSQL + pgvector.
      operationId: ingestDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Arquivo .txt ou .pdf (tamanho máximo 5.242.880 bytes)
      responses:
        '201':
          description: Documento aceito para processamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Formato inválido (apenas TXT e PDF)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Arquivo excede o limite de 5MB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Documento vazio ou sem texto extraível
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}:
    get:
      tags: [Documentos]
      summary: Obter status do processamento de um documento
      operationId: getDocumentStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do documento
      responses:
        '200':
          description: Status retornado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentStatusResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Documento não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}/reprocess:
    post:
      tags: [Documentos]
      summary: >
        Reprocessar um documento já indexado. O documento é reenviado pelo
        pipeline completo de ingestão (parse → chunk → embed → persist).
      operationId: reprocessDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do documento a ser reprocessado
      responses:
        '202':
          description: Reprocessamento aceito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Documento não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      tags: [Infraestrutura]
      summary: Verificar saúde da aplicação
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Aplicação saudável
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
