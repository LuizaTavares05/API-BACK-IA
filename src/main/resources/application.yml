server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: chat-ia-backend
  datasource:
    url: jdbc:h2:mem:chatiabe
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: "dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgSldUIHNpZ25pbmcgdXNpbmcgSE1BQyBTSEEyNTYgYWxnb3JpdGht"
    expiration: 86400

cors:
  allowed-origins: http://localhost:5173
