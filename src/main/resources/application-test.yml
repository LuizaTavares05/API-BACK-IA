spring:
  datasource:
    url: jdbc:h2:mem:chatiabe-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test-key
      base-url: http://localhost:9999

logging:
  level:
    br.com.chatiabe: DEBUG
